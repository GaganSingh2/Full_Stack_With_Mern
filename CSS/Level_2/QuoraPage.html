<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quora Page</title>
    <link rel="stylesheet" href="QuoraPage.css">
</head>
<body>
    <header>
        <h1>Quora
            <button id="login">Log in</button>
            <button id="signup">Sign up</button>
        </h1>
        <div>
            <input type="text" name="username" id="" placeholder="username">
            <input type="text" name="password" id="" placeholder="password">
        </div>
        <nav>
            <ul>
                <li><a href="/home">Home</a></li>
                <li><a href="/following">Following</a></li>
                <li><a href="/answer">Answer</a></li>
                <li><a href="/space">Spaces</a></li>
            </ul>
        </nav>
        <hr>
    </header>

    <main>
        <p>
            Adam &nbsp;&nbsp;
            <a class="follow" href="/adam">Follow /abc</a>
        </p>
        <h3>What is the highest salary for a spacex engineer?</h3>
        <span>
            <button>+upvote</button>
            <button>answer</button>
        </span>
        <hr>

        <p>
            Bob &nbsp;&nbsp;
            <a class="follow" href="/bob">Follow /xyz</a>
            <h3>What is the syllabus for JEE 2026?</h3>
            <span>
                <button>+upvote</button>
                <button>answer</button>
            </span>
            <hr>
        </p>

        <p>
            Catlyn &nbsp;&nbsp;&nbsp;&nbsp;
            <a class="follow" href="/catlyn">Follow /pqr</a>
            <h3>Why is the sky blue?</h3>
            <span>
                <button>+upvote</button>
                <button>answer</button>
            </span>
            <hr>
        </p>

        <p>
            Dan &nbsp;&nbsp;&nbsp;&nbsp;
            <a class="follow" href="/dan">Follow /jkl</a>
            <h3>Why is the water white?</h3>
            <span>
                <button>+upvote</button>
                <button>answer</button>
            </span>
            <hr>
        </p>
    </main>
</body>
</html>
